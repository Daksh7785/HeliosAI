version: '3.8'

services:
  api:
    build:
      context: .
      target: builder
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./src:/app/src

  dash:
    volumes:
      - ./src:/app/src
    environment:
      - DASH_DEBUG=true

  streamlit:
    volumes:
      - ./src:/app/src

  celery-worker:
    build:
      context: .
      target: builder
    volumes:
      - ./src:/app/src
