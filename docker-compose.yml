version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: helios
      POSTGRES_PASSWORD: password
      POSTGRES_DB: heliosai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helios"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - HELIOS_DB_URL=postgresql://helios:password@postgres:5432/heliosai
      - HELIOS_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api:/app/services/api
      - ./shared:/app/shared

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    ports:
      - "8050:8050"
    environment:
      - HELIOS_API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./services/dashboard:/app/services/dashboard
      - ./shared:/app/shared

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    environment:
      - HELIOS_REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/ingestion:/app/services/ingestion
      - ./shared:/app/shared

  processing:
    build:
      context: .
      dockerfile: services/processing/Dockerfile
    environment:
      - HELIOS_DB_URL=postgresql://helios:password@postgres:5432/heliosai
      - HELIOS_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/processing:/app/services/processing
      - ./shared:/app/shared

  intelligence:
    build:
      context: .
      dockerfile: services/intelligence/Dockerfile
    environment:
      - HELIOS_DB_URL=postgresql://helios:password@postgres:5432/heliosai
      - HELIOS_REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/intelligence:/app/services/intelligence
      - ./shared:/app/shared

volumes:
  postgres_data:
  redis_data:
